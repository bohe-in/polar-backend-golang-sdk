          "200":
            statusCode: "200"
            responseParameters: {}
          "400":
            statusCode: "400"
            responseParameters: {}
components:
  schemas:
    RequestsLinkAnalyticTags:
      example:
        feature: feature
        channel: channel
        campaign: campaign
        tags: tags
      properties:
        campaign:
          nullable: true
          type: string
        channel:
          nullable: true
          type: string
        feature:
          nullable: true
          type: string
        tags:
          nullable: true
          type: string
      type: object
    RequestsLinkRedirects:
      example:
        iosRedirect: iosRedirect
        webOnly: true
        desktopRedirect: desktopRedirect
        androidRedirect: androidRedirect
      properties:
        androidRedirect:
          nullable: true
          type: string
        desktopRedirect:
          nullable: true
          type: string
        iosRedirect:
          nullable: true
          type: string
        webOnly:
          nullable: true
          type: boolean
      type: object
    RequestsLinkSocialMediaTags:
      example:
        description: description
        title: title
      properties:
        description:
          type: string
        title:
          type: string
      required:
      - description
      - title
      type: object
    ResponsesErrorDetails:
      properties:
        code:
          type: string
        details: {}
        message:
          type: string
        statusCode:
          format: int32
          type: integer
      type: object
    ResponsesErrorResponse:
      properties:
        error:
          $ref: '#/components/schemas/ResponsesErrorDetails'
        requestId:
          type: string
        version:
          type: string
      type: object
    ResponsesLinkAnalyticTags:
      example:
        feature: feature
        channel: channel
        campaign: campaign
        tags: tags
      properties:
        campaign:
          nullable: true
          type: string
        channel:
          nullable: true
          type: string
        feature:
          nullable: true
          type: string
        tags:
          nullable: true
          type: string
      required:
      - campaign
      - channel
      - feature
      - tags
      type: object
    ResponsesLinkSocialMediaTags:
      example:
        description: description
        title: title
      properties:
        description:
          type: string
        title:
          type: string
      required:
      - description
      - title
      type: object
    ResponsesSdkLink:
      example:
        data:
          key: ""
        analyticsTags:
          feature: feature
          channel: channel
          campaign: campaign
          tags: tags
        socialMediaTags:
          description: description
          title: title
        slug: slug
        url: url
      properties:
        analyticsTags:
          $ref: '#/components/schemas/ResponsesLinkAnalyticTags'
        data:
          additionalProperties: {}
          type: object
        slug:
          type: string
        socialMediaTags:
          $ref: '#/components/schemas/ResponsesLinkSocialMediaTags'
        url:
          type: string
      type: object
    ResponsesSdkLinkResponse:
      example:
        data:
          sdkLinkData:
            data:
              key: ""
            analyticsTags:
              feature: feature
              channel: channel
              campaign: campaign
              tags: tags
            socialMediaTags:
              description: description
              title: title
            slug: slug
            url: url
        requestID: requestID
        version: version
      properties:
        data:
          $ref: '#/components/schemas/ResponsesSdkLinkResponse_data'
        requestID:
          type: string
        version:
          type: string
      type: object
    ResponsesSuccessResponse:
      example:
        requestID: requestID
        version: version
      properties:
        requestID:
          type: string
        version:
          type: string
      type: object
    BeSdkRunEmailCampaignRequest:
      example:
        userUnid: userUnid
        campaignUnid: campaignUnid
      properties:
        campaignUnid:
          type: string
        userUnid:
          type: string
      required:
      - campaignUnid
      - userUnid
      title: BeSdkRunEmailCampaignRequest
      type: object
    BeSdkRunPushCampaignRequest:
      example:
        userUnid: userUnid
        campaignUnid: campaignUnid
      properties:
        campaignUnid:
          type: string
        userUnid:
          type: string
      required:
      - campaignUnid
      - userUnid
      title: BeSdkRunPushCampaignRequest
      type: object
    BeSdkCreateLinkRequest:
      example:
        data:
          key: ""
        redirects:
          iosRedirect: iosRedirect
          webOnly: true
          desktopRedirect: desktopRedirect
          androidRedirect: androidRedirect
        analyticsTags:
          feature: feature
          channel: channel
          campaign: campaign
          tags: tags
        name: name
        socialMediaTags:
          description: description
          title: title
      properties:
        analyticsTags:
          $ref: '#/components/schemas/RequestsLinkAnalyticTags'
        data:
          additionalProperties: {}
          type: object
        name:
          type: string
        redirects:
          $ref: '#/components/schemas/RequestsLinkRedirects'
        socialMediaTags:
          $ref: '#/components/schemas/RequestsLinkSocialMediaTags'
      required:
      - name
      title: BeSdkCreateLinkRequest
      type: object
    BeSdkUserProfileUpdateRequest:
      example:
        data:
          key: ""
        clobberMatchingAttributes: true
        userID: userID
      properties:
        clobberMatchingAttributes:
          type: boolean
        data:
          additionalProperties: {}
          type: object
        userID:
          type: string
      required:
      - data
      title: BeSdkUserProfileUpdateRequest
      type: object
    ResponsesSdkLinkResponse_data:
      example:
        sdkLinkData:
          data:
            key: ""
          analyticsTags:
            feature: feature
            channel: channel
            campaign: campaign
            tags: tags
          socialMediaTags:
            description: description
            title: title
          slug: slug
          url: url
      properties:
        sdkLinkData:
          $ref: '#/components/schemas/ResponsesSdkLink'
      type: object
  securitySchemes:
    api_key:
      in: header
      name: x-api-key
      type: apiKey
