openapi: 3.0.1
info:
  description: Backend SDK API for polar
  title: Polar Backend SDK Server
  version: 1.0.0
servers:
- url: /
tags:
- description: Health related routes
  name: Health
paths:
  /api/v1/campaigns/email/run:
    post:
      operationId: RunEmailCampaign
      parameters:
      - explode: false
        in: header
        name: x-api-key
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: header
        name: x-api-secret
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeSdkRunEmailCampaignRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSuccessResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesErrorResponse'
          description: Bad Request
      security:
      - api_key: []
      x-amazon-apigateway-integration:
        type: http
        uri: "http://${stageVariables.url}/api/v1/campaigns/email/run"
        httpMethod: post
        requestParameters:
          integration.request.header.api-gtway-ip: context.identity.sourceIp
          integration.request.header.x-api-key: context.identity.apiKey
          integration.request.header.x-api-secret: method.request.header.x-api-secret
        responses:
          "200":
            statusCode: "200"
            responseParameters: {}
          "400":
            statusCode: "400"
            responseParameters: {}
  /api/v1/campaigns/push/run:
    post:
      operationId: RunPushCampaign
      parameters:
      - explode: false
        in: header
        name: x-api-key
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: header
        name: x-api-secret
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeSdkRunPushCampaignRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSuccessResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesErrorResponse'
          description: Bad Request
      security:
      - api_key: []
      x-amazon-apigateway-integration:
        type: http
        uri: "http://${stageVariables.url}/api/v1/campaigns/push/run"
        httpMethod: post
        requestParameters:
          integration.request.header.api-gtway-ip: context.identity.sourceIp
          integration.request.header.x-api-key: context.identity.apiKey
          integration.request.header.x-api-secret: method.request.header.x-api-secret
        responses:
          "200":
            statusCode: "200"
            responseParameters: {}
          "400":
            statusCode: "400"
            responseParameters: {}
  /api/v1/health/:
    get:
      operationId: Health
      parameters:
      - explode: false
        in: header
        name: Origin
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSuccessResponse'
          description: OK
          headers:
            Access-Control-Allow-Headers:
              description: allowed headers
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Methods:
              description: allowed methods
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Origin:
              description: allowed origin
              explode: false
              schema:
                type: string
              style: simple
            Origin:
              description: allow everywhere
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesErrorResponse'
          description: Bad Request
          headers:
            Access-Control-Allow-Headers:
              description: allowed headers
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Methods:
              description: allowed methods
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Origin:
              description: allowed origin
              explode: false
              schema:
                type: string
              style: simple
            Origin:
              description: allow everywhere
              explode: false
              schema:
                type: string
              style: simple
      tags:
      - Health
      x-amazon-apigateway-integration:
        type: http
        uri: "http://${stageVariables.url}/api/v1/health/"
        httpMethod: get
        requestParameters:
          integration.request.header.Origin: method.request.header.Origin
          integration.request.header.api-gtway-ip: context.identity.sourceIp
          integration.request.header.x-api-key: context.identity.apiKey
        responses:
          "200":
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: integration.response.header.Access-Control-Allow-Headers
              method.response.header.Access-Control-Allow-Methods: integration.response.header.Access-Control-Allow-Methods
              method.response.header.Access-Control-Allow-Origin: integration.response.header.Access-Control-Allow-Origin
              method.response.header.Origin: integration.response.header.Origin
          "400":
            statusCode: "400"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: integration.response.header.Access-Control-Allow-Headers
              method.response.header.Access-Control-Allow-Methods: integration.response.header.Access-Control-Allow-Methods
              method.response.header.Access-Control-Allow-Origin: integration.response.header.Access-Control-Allow-Origin
              method.response.header.Origin: integration.response.header.Origin
    options:
      operationId: HealthOptions
      parameters:
      - explode: false
        in: header
        name: Origin
        required: false
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSuccessResponse'
          description: OK
          headers:
            Access-Control-Allow-Headers:
              description: allowed headers
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Methods:
              description: allowed methods
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Origin:
              description: allowed origin
              explode: false
              schema:
                type: string
              style: simple
            Origin:
              description: allow everywhere
              explode: false
              schema:
                type: string
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesErrorResponse'
          description: Bad Request
          headers:
            Access-Control-Allow-Headers:
              description: allowed headers
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Methods:
              description: allowed methods
              explode: false
              schema:
                type: string
              style: simple
            Access-Control-Allow-Origin:
              description: allowed origin
              explode: false
              schema:
                type: string
              style: simple
            Origin:
              description: allow everywhere
              explode: false
              schema:
                type: string
              style: simple
      tags:
      - Health
      x-amazon-apigateway-integration:
        type: http
        uri: "http://${stageVariables.url}/api/v1/health/"
        httpMethod: options
        requestParameters:
          integration.request.header.Origin: method.request.header.Origin
          integration.request.header.api-gtway-ip: context.identity.sourceIp
          integration.request.header.x-api-key: context.identity.apiKey
        responses:
          "200":
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: integration.response.header.Access-Control-Allow-Headers
              method.response.header.Access-Control-Allow-Methods: integration.response.header.Access-Control-Allow-Methods
              method.response.header.Access-Control-Allow-Origin: integration.response.header.Access-Control-Allow-Origin
              method.response.header.Origin: integration.response.header.Origin
          "400":
            statusCode: "400"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: integration.response.header.Access-Control-Allow-Headers
              method.response.header.Access-Control-Allow-Methods: integration.response.header.Access-Control-Allow-Methods
              method.response.header.Access-Control-Allow-Origin: integration.response.header.Access-Control-Allow-Origin
              method.response.header.Origin: integration.response.header.Origin
  /api/v1/links:
    post:
      operationId: CreateLink
      parameters:
      - explode: false
        in: header
        name: x-api-key
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: header
        name: x-api-secret
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeSdkCreateLinkRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSdkLinkResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesErrorResponse'
          description: Bad Request
      security:
      - api_key: []
      x-amazon-apigateway-integration:
        type: http
        uri: "http://${stageVariables.url}/api/v1/links"
        httpMethod: post
        requestParameters:
          integration.request.header.api-gtway-ip: context.identity.sourceIp
          integration.request.header.x-api-key: context.identity.apiKey
          integration.request.header.x-api-secret: method.request.header.x-api-secret
        responses:
          "200":
            statusCode: "200"
            responseParameters: {}
          "400":
            statusCode: "400"
            responseParameters: {}
  /api/v1/users/profile:
    post:
      operationId: UpdateUserProfile
      parameters:
      - explode: false
        in: header
        name: x-api-key
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: header
        name: x-api-secret
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BeSdkUserProfileUpdateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsesSuccessResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
